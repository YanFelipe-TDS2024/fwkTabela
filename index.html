<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Personalizada</title>
    <link rel="stylesheet" href="estiloTabela.css">
</head>
<body>
    <tabela linhas="5", colunas="5", borda="2px black solid">
        <expand linha="0", coluna="0", tamanho="2", tipo="coluna"></expand>
        <expand linha="2", coluna="3", tamanho="2", tipo="linha"></expand>
        <expand linha="4", coluna="3", tamanho="2", tipo="coluna"></expand>
        <expand linha="2", coluna="0", tamanho="3", tipo="linha"></expand>
    </tabela>
</body>
</html>
